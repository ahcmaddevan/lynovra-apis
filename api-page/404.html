<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lynovra REST API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #080d14;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glow {
            position: fixed;
            top: -200px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, transparent 70%);
        }
        .card {
            position: relative;
            background: #0f1724;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 56px 48px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .code-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 80px;
            font-weight: 700;
            color: #0ea5e9;
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.9;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(14,165,233,0.35);
        }
        .btn:hover { background: #0284c7; transform: translateY(-2px); }
        .divider {
            width: 48px; height: 2px;
            background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
            margin: 0 auto 24px;
        }
        .lynovra {
            margin-top: 32px;
            font-size: 12px;
            color: #475569;
        }
        .lynovra a { color: #0ea5e9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow"></div>
    <div class="card">
        <div class="code-badge">404</div>
        <div class="divider"></div>
        <h1>Halaman Tidak Ditemukan</h1>
        <p>Endpoint atau halaman yang kamu cari tidak ada, atau mungkin sudah dipindahkan.</p>
        <a href="/" class="btn">← Kembali ke Beranda</a>
        <div class="lynovra">
            Powered by <a href="https://lynovra.my.id" target="_blank" rel="noopener noreferrer">Lynovra Technology Solutions</a>
        </div>
    </div>
</body>
</html>
